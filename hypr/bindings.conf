## Screenshots
# bindd = , PRINT, Screenshot of region, exec, omarchy-cmd-screenshot
unbind = SUPER, semicolon
unbind = SUPER, Semicolon
unbind = SUPER, SEMICOLON
unbind = SUPER, $semicolon
bindd = SUPER, Semicolon, Screenshot of region to clipboard, exec, grim -g "$(slurp -w 0)" - | wl-copy # Take an area-select screenshot
# bindd = SUPER SHIFT CTRL, semicolon, Screenshot of region, exec, omarchy-cmd-screenshot
# bindd = SUPER SHIFT, semicolon, Screenshot of window, exec, omarchy-cmd-screenshot window
# bindd = SUPER CTRL, semicolon, Screenshot of display, exec, omarchy-cmd-screenshot output

## Screen recordings
unbind = SUPER ALT, semicolon
unbind = SUPER ALT, Semicolon
unbind = SUPER ALT, SEMICOLON
unbind = SUPER ALT, $semicolon
bindd = SUPER ALT, Semicolon, Screen Record, exec, omarchy-menu screenrecord
#bindd = SUPER CTRL ALT, semicolon, Screen record a region with audio, exec, omarchy-cmd-screenrecord region audio
#bindd = SUPER SHIFT ALT, semicolon, Screen record display, exec, omarchy-cmd-screenrecord output
#bindd = SUPER SHIFT CTRL ALT, semicolon, Screen record display with audio, exec, omarchy-cmd-screenrecord output audio

## Screen record single-key
$rec = omarchy-cmd-screenrecord
$rec_audio_mic = omarchy-cmd-screenrecord --with-microphone-audio
$rec_audio_desktop = omarchy-cmd-screenrecord --with-desktop-audio
$rec_audio_mic_desktop = omarchy-cmd-screenrecord --with-desktop-audio --with-microphone-audio
$rec_webcam_audio_mic_desktop = omarchy-cmd-screenrecord --with-desktop-audio --with-microphone-audio --with-webcam
unbind = SUPER, R
unbind = SUPER, $r
bindd = SUPER, R, Screen Record, exec, $rec_audio_mic_desktop
#
# Force recording to stop
unbind = SUPER SHIFT, R
unbind = SUPER SHIFT, $r
bindd = SUPER SHIFT, R, Stop Screen Recording, exec, omarchy-cmd-screenrecord --stop-recording

## Screen record to gif
unbind = SUPER CTRL, R
unbind = SUPER CTRL, $r
bindd = SUPER CTRL, R, Screen Record GIF, exec, $bin/gifrecord

