## Discord
$app_discord = dev.vencord.Vesktop
$app_discord_cmd = $uwsm_launch $app_discord --ozone-platform-hint=auto
$app_discord_desc = Discord
$app_discord_class = vesktop
$scratchpad_discord = Discord
workspace = special:$scratchpad_discord, on-created-empty:$app_discord_cmd
windowrule = workspace special:$scratchpad_discord, match:class $app_discord_class
#
unbind = SUPER, slash
unbind = SUPER, Slash
unbind = SUPER, SLASH
unbind = SUPER, $slash
bindd = SUPER, Slash, $scratchpad_prefix $scratchpad_discord, togglespecialworkspace, $scratchpad_discord
#
unbind = SUPER SHIFT CTRL, slash
unbind = SUPER SHIFT CTRL, $slash
bindd = SUPER SHIFT CTRL, slash, Move to $scratchpad_prefix $scratchpad_discord, movetoworkspace, special:$scratchpad_discord

## Notes 1 - (Obsidian)
$app_notes_1 = obsidian
$app_notes_1_cmd = $uwsm_launch $app_notes_1 -disable-gpu
$app_notes_1_desc = Obsidian
$scratchpad_notes_1 = Obsidian
workspace = special:$scratchpad_notes_1, on-created-empty:$app_notes_1_cmd
#
unbind = SUPER, O
unbind = SUPER, $o
bindd = SUPER, $o, $scratchpad_prefix $scratchpad_notes_1, togglespecialworkspace, $scratchpad_notes_1
#
unbind = SUPER SHIFT CTRL, O
unbind = SUPER SHIFT CTRL, $o
bindd = SUPER SHIFT CTRL, O, Move to $scratchpad_prefix $scratchpad_notes_1, movetoworkspace, special:$scratchpad_notes_1
#
# Obsidian new window
unbind = SUPER SHIFT, O
unbind = SUPER SHIFT, $o
bindd = SUPER SHIFT, O, $app_notes_desc, exec, $app_notes_cmd

## Remote Desktop
$app_remote_desktop = com.moonlight_stream.Moonlight
$app_remote_desktop_cmd = $uwsm_launch $app_remote_desktop
$app_remote_desktop_desc = Moonlight
$app_remote_desktop_class = com.moonlight_stream.Moonlight
$scratchpad_remote_desktop = Moonlight
workspace = special:$scratchpad_remote_desktop, on-created-empty:$app_remote_desktop_cmd
windowrule = workspace special:$scratchpad_remote_desktop, match:class $app_remote_desktop_class
unbind = SUPER CTRL, M
unbind = SUPER CTRL, $m
bindd = SUPER CTRL, M, $scratchpad_prefix $scratchpad_remote_desktop, togglespecialworkspace, $scratchpad_remote_desktop

## Grayjay
$app_grayjay = app.grayjay.Grayjay
$app_grayjay_cmd = $uwsm_launch flatpak run $app_grayjay
$app_grayjay_desc = Grayjay
$scratchpad_grayjay = Grayjay
workspace = special:$scratchpad_grayjay, on-created-empty:$app_grayjay_cmd
#
unbind = SUPER, M
unbind = SUPER, $m
bindd = SUPER, M, $scratchpad_prefix $scratchpad_grayjay, togglespecialworkspace, $scratchpad_grayjay
#
# Move window to grayjay scratchpad
unbind = SUPER SHIFT CTRL, M
unbind = SUPER SHIFT CTRL, $m
bindd = SUPER SHIFT CTRL, M, Move to $scratchpad_prefix $scratchpad_grayjay, movetoworkspace, special:$scratchpad_grayjay
#
# Launch standalone Grayjay window
unbind = SUPER SHIFT, M
unbind = SUPER SHIFT, $m
bindd = SUPER SHIFT, M, $app_grayjay_desc, exec, $app_grayjay_cmd

## Password Manager
$app_pwm = bitwarden-desktop
$app_pwm_cmd = $uwsm_launch $app_pwm
$app_pwm_desc = Bitwarden
$scratchpad_pwm = Bitwarden
workspace = special:$scratchpad_pwm, on-created-empty:$app_pwm_cmd
#
unbind = SUPER SHIFT, P
unbind = SUPER SHIFT, $p
bindd = SUPER SHIFT, P, $scratchpad_prefix $scratchpad_pwm, togglespecialworkspace, $scratchpad_pwm

## VPN 1
