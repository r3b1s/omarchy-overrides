workspace = special:$scratchpad_codeforge_1, on-created-empty:$app_codeforge_1_cmd
#
unbind = SUPER, G
unbind = SUPER, $g
bindd = SUPER, G, $scratchpad_prefix $scratchpad_codeforge_1, togglespecialworkspace, $scratchpad_codeforge_1
#
# Move to scratchpad
unbind = SUPER SHIFT CTRL, G
unbind = SUPER SHIFT CTRL, $g
bindd = SUPER SHIFT CTRL, G, Move to $scratchpad_codeforge_1 $scratchpad_suffix, movetoworkspace, special:$scratchpad_codeforge_1

## Calendar
