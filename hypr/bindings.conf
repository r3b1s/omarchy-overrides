## Brightness
unbind = , $bright_up
bindd = , $bright_up, Brightness Up, exec, omarchy-brightness-display +5%
unbind = , $bright_dn
bindd = , $bright_dn, Brightness Down, exec, omarchy-brightness-display 5%-

## Fine Tune Brightness
unbind = ALT, $bright_up
bindd = ALT, $bright_up, Fine Brightness Up, exec, omarchy-brightness-display +1%
unbind = ALT, $bright_dn
bindd = ALT, $bright_dn, Bine Brightness Down, exec, omarchy-brightness-display 1%-

## Nightlight
unbind = SUPER CTRL, N
unbind = SUPER CTRL, $n
bindd = SUPER CTRL, N, Toggle Nightlight, exec, $bin/my-toggle-nightlight

## Hyprland Display Scale Increase
unbind = SUPER ALT, equal
unbind = SUPER ALT, Equal
unbind = SUPER ALT, EQUAL
unbind = SUPER ALT, $equal
bindd = SUPER ALT, Equal, Display Scale - Increase, exec, $bin/hyprland-monitor-scale in

## Hyprland Display Scale Decrease
unbind = SUPER ALT, minus
unbind = SUPER ALT, Minus
unbind = SUPER ALT, MINUS
unbind = SUPER ALT, $minus
bindd = SUPER ALT, Minus, Display Scale - Decrease, exec, $bin/hyprland-monitor-scale out

## Hyprland Window Gap Cycle
unbind = SUPER SHIFT, backspace
unbind = SUPER SHIFT, Backspace
unbind = SUPER SHIFT, BACKSPACE
unbind = SUPER SHIFT, $backspace
bindd = SUPER SHIFT, Backspace, Cycle Window Gap Size, exec, $bin/hyprland-window-gaps-cycle

## Hyprland Window Border Thickness Cycle
unbind = SUPER CTRL, backspace
unbind = SUPER CTRL, BACKSPACE
unbind = SUPER CTRL, Backspace
unbind = SUPER CTRL, $backspace
bindd = SUPER CTRL, Backspace, Cycle Window Border Thickness, exec, $bin/hyprland-window-borders-cycle

## Hyprland Active Workspace Layout Cycle
unbind = SUPER ALT, backspace
unbind = SUPER ALT, Backspace
unbind = SUPER ALT, BACKSPACE
unbind = SUPER ALT, $backspace
bindd = SUPER ALT, Backspace, Cycle active workspace layout, exec, $bin/hyprland-workspace-layout

## Hyprland Window Border Rounding Toggle
unbind = SUPER SHIFT CTRL ALT, backspace
unbind = SUPER SHIFT CTRL ALT, Backspace
unbind = SUPER SHIFT CTRL ALT, BACKSPACE
unbind = SUPER SHIFT CTRL ALT, $backspace
bindd = SUPER SHIFT CTRL ALT, Backspace, Toggle Window Rounding, exec, $bin/hyprland-window-round-toggle

