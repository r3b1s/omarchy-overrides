#
unbind = SUPER SHIFT, E
unbind = SUPER SHIFT, $e
bindd = SUPER SHIFT, E, $scratchpad_prefix $scratchpad_email, togglespecialworkspace, $scratchpad_email
#
# Launch email outside of scratchpad
unbind = SUPER SHIFT CTRL, E
