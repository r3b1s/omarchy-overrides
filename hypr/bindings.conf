#################### SCRATCHPADS #####################
######    (Scratchpad == Special Workspace)     ######

# on-created-empty -> launch app based on workspace

## Vars

# Scratchpad description prefix/suffix
$scratchpad_prefix = Scratchpad:
$scratchpad_suffix = Scratchpad

# Browser - Firefox
$firefox_profile_main = Personal
$firefox_new_window_cmd = $uwsm_launch firefox --new-window -P $firefox_profile_main

# Omarchy-specific defaults / default-overrides
$omarchy_launch_webapp = omarchy-launch-webapp
$omarchy_launch_or_focus_webapp = omarchy-launch-or-focus-webapp

# Default Webapp Command
$launch_webapp_cmd = $firefox_new_window_cmd

###########################
#### Empty Scratchpads ####
###                     ###

## i.e. utility scratchpads

## Scratchpad-1
$scratchpad_empty_1 = Utility 1
workspace = special:$scratchpad_empty_1
#
unbind = SUPER, period
unbind = SUPER, Period
unbind = SUPER, PERIOD
unbind = SUPER, $period
bindd = SUPER, Period, $scratchpad_prefix $scratchpad_empty_1, togglespecialworkspace, $scratchpad_empty_1
#
unbind = SUPER SHIFT CTRL, period
unbind = SUPER SHIFT CTRL, Period
unbind = SUPER SHIFT CTRL, PERIOD
unbind = SUPER SHIFT CTRL, $period
bindd = SUPER SHIFT CTRL, Period, Move to $scratchpad_prefix $scratchpad_empty_1, movetoworkspace, special:$scratchpad_empty_1

## Scratchpad-2
$scratchpad_empty_2 = Utility 2
workspace = special:$scratchpad_empty_2
#
unbind = SUPER, U
unbind = SUPER, $u
bindd = SUPER, U, $scratchpad_prefix $scratchpad_empty_2, togglespecialworkspace, $scratchpad_empty_2
#
unbind = SUPER SHIFT CTRL, U
unbind = SUPER SHIFT CTRL, $u
bindd = SUPER SHIFT CTRL, U, Move to $scratchpad_prefix $scratchpad_empty_2, movetoworkspace, special:$scratchpad_empty_2

## Scratchpad-3
$scratchpad_empty_3 = Utility 3
workspace = special:$scratchpad_empty_3
#
unbind = SUPER, Y
unbind = SUPER, $y
bindd = SUPER, Y, $scratchpad_prefix $scratchpad_empty_3, togglespecialworkspace, $scratchpad_empty_3
#
unbind = SUPER SHIFT CTRL, Y
unbind = SUPER SHIFT CTRL, $y
bindd = SUPER SHIFT CTRL, Y, Move to $scratchpad_prefix $scratchpad_empty_3, movetoworkspace, special:$scratchpad_empty_3

