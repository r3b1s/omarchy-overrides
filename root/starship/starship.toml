add_newline = true
command_timeout = 200
follow_symlinks = true
format = """
$username[@](bold green)$hostname[ -- ](bold green)[${custom.pwd}
$git_branch$git_status]($style)$character
"""

[username]
format = "[$user]($style)"
style_user = "bold red"
style_root = "bold red"
show_always = true

[hostname]
format = "[$hostname](bold red)[$ssh_symbol](bold green)"
ssh_only = false
ssh_symbol = " -- \\[SSH\\]"
disabled = false

[character]
error_symbol = "[ ✗ # ](bold bg:red fg:black)"
success_symbol = "[ + \\$ ](bold bg:green fg:black)"

[directory]
disabled = true

[custom.pwd]
command = "echo $PWD"
when = "true"
format = "[$output]($style)"
style = "bold red"

[git_branch]
format = "[$branch]($style) "
style = "italic red"

[git_status]
format     = '[$all_status]($style)'
style      = "red"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""

